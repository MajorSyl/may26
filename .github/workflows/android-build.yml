name: Build Android APK

# Manual only -- tap "Run workflow" on the Actions tab whenever you want a
# fresh debug build. This never runs automatically on push, so it costs
# nothing unless you trigger it.
on:
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify this branch has the Capacitor Android project
        run: |
          if [ ! -f capacitor.config.ts ] || [ ! -d android ]; then
            echo "::error::No capacitor.config.ts / android/ directory on this branch (${{ github.ref_name }})."
            echo "::error::The Capacitor project only exists on claude/rotary-freetown-sunset-setup-920hfl."
            echo "::error::Re-run this workflow and pick that branch in the 'Use workflow from' dropdown -- it defaults to the repo's default branch (main), not whatever branch you were browsing."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager -type f | head -n1)
          yes | "$SDKMANAGER" --licenses

      - name: Install web dependencies
        run: npm install

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync web build into the Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rotary-club-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
